<svg viewBox="0 0 1400 740" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6472"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="740" fill="#ffffff"/>

  <text x="700" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1a2330">AWS Landing Zone — Account &amp; Network Guardrails</text>
  <text x="700" y="55" text-anchor="middle" font-size="12.5" fill="#5b6472">Organization, OUs, and accounts — grounded in terraform/aws-lz (validated)</text>

  <!-- Org bar -->
  <rect x="40" y="78" width="1320" height="40" rx="6" fill="#1a2330"/>
  <text x="700" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">AWS Organization (root)</text>

  <line x1="700" y1="118" x2="700" y2="140" stroke="#5b6472" stroke-width="2"/>
  <line x1="150" y1="140" x2="1250" y2="140" stroke="#5b6472" stroke-width="2"/>
  <line x1="150" y1="140" x2="150" y2="155" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="490" y1="140" x2="490" y2="155" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="900" y1="140" x2="900" y2="155" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Security OU -->
  <rect x="335" y="160" width="310" height="150" rx="8" fill="#f4f0fb" stroke="#7a5fb0" stroke-width="1.5"/>
  <text x="490" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3d2c5c">OU: Security</text>

  <rect x="355" y="195" width="130" height="100" rx="6" fill="#ffffff" stroke="#7a5fb0"/>
  <text x="420" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#3d2c5c">{prefix}-log-archive</text>
  <text x="420" y="234" text-anchor="middle" font-size="9.5" fill="#5c4a80">Org CloudTrail → S3</text>
  <text x="420" y="248" text-anchor="middle" font-size="9.5" fill="#5c4a80">KMS-encrypted</text>
  <text x="420" y="264" text-anchor="middle" font-size="9.5" fill="#5c4a80">Glue + Athena</text>
  <text x="420" y="278" text-anchor="middle" font-size="9.5" fill="#5c4a80">Standard-IA→Glacier→7y</text>

  <rect x="500" y="195" width="130" height="100" rx="6" fill="#ffffff" stroke="#7a5fb0"/>
  <text x="565" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#3d2c5c">{prefix}-audit-security</text>
  <text x="565" y="238" text-anchor="middle" font-size="9.5" fill="#5c4a80">Security tooling +</text>
  <text x="565" y="252" text-anchor="middle" font-size="9.5" fill="#5c4a80">Tri-Secret Secure CMK</text>
  <text x="565" y="266" text-anchor="middle" font-size="9.5" fill="#5c4a80">(KMS)</text>

  <!-- Left column: Infrastructure OU (narrower, above Workloads panel start) -->
  <rect x="55" y="160" width="190" height="90" rx="8" fill="#eef7fb" stroke="#1a8cc4" stroke-width="1.5"/>
  <text x="150" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0d4a63">OU: Infrastructure</text>
  <text x="150" y="202" text-anchor="middle" font-size="10.5" fill="#3a4250">{prefix}-network account</text>
  <text x="150" y="218" text-anchor="middle" font-size="10.5" fill="#3a4250">owns VPC(s), shares via RAM</text>
  <text x="150" y="234" text-anchor="middle" font-size="10.5" fill="#3a4250">RAM-shared subnets (no TGW)</text>

  <!-- Workloads OU (wide) -->
  <rect x="675" y="160" width="575" height="470" rx="8" fill="#eef7fb" stroke="#1a8cc4" stroke-width="1.5"/>
  <text x="962" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0d4a63">OU: Workloads</text>
  <text x="962" y="198" text-anchor="middle" font-size="10" fill="#3a6b80">dev / staging / prod — prod shown; others mirror this structure</text>

  <rect x="695" y="210" width="535" height="405" rx="6" fill="#ffffff" stroke="#1a8cc4" stroke-dasharray="4,3"/>
  <text x="962" y="230" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0d4a63">account: {prefix}-prod</text>

  <!-- Network account detail (moved lower, spans into workloads visual area but tagged) -->
  <rect x="715" y="245" width="240" height="345" rx="6" fill="#fbfdff" stroke="#1a8cc4"/>
  <text x="835" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0d4a63">Network account (shared)</text>
  <text x="835" y="279" text-anchor="middle" font-size="9.5" fill="#3a6b80">RAM-shared into this account</text>

  <rect x="730" y="290" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="307" text-anchor="middle" font-size="9.5" fill="#1a2330">VPC — private subnets, 2 AZ</text>
  <text x="835" y="321" text-anchor="middle" font-size="9" fill="#5b6472">no public subnets by default</text>

  <rect x="730" y="338" width="210" height="30" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="357" text-anchor="middle" font-size="9.5" fill="#1a2330">NAT Gateway — per-AZ (prod)</text>

  <rect x="730" y="374" width="210" height="30" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="393" text-anchor="middle" font-size="9.5" fill="#1a2330">Private Route 53 zone</text>

  <rect x="730" y="410" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="427" text-anchor="middle" font-size="9.5" fill="#1a2330">Security group: deny-all ingress</text>
  <text x="835" y="441" text-anchor="middle" font-size="9" fill="#5b6472">allow internal VPC CIDR only</text>

  <rect x="730" y="458" width="210" height="46" rx="4" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="835" y="476" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a5316">AWS PrivateLink endpoint</text>
  <text x="835" y="490" text-anchor="middle" font-size="9" fill="#8a5316">→ Snowflake account</text>

  <text x="835" y="522" text-anchor="middle" font-size="9" fill="#8a8f98">VPC Flow Logs → CloudWatch</text>
  <text x="835" y="535" text-anchor="middle" font-size="9" fill="#8a8f98">90d (dev/stg) / 365d (prod)</text>

  <!-- Workload account resources -->
  <rect x="970" y="245" width="240" height="345" rx="6" fill="#fbfdff" stroke="#1a8cc4"/>
  <text x="1090" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0d4a63">{prefix}-prod account</text>
  <text x="1090" y="279" text-anchor="middle" font-size="9.5" fill="#3a6b80">(workloads — no VPC of its own)</text>

  <rect x="985" y="290" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="1090" y="307" text-anchor="middle" font-size="9.5" fill="#1a2330">EC2 / ECS / RDS</text>
  <text x="1090" y="321" text-anchor="middle" font-size="9" fill="#5b6472">launches into RAM-shared subnet</text>

  <rect x="985" y="338" width="210" height="42" rx="4" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="1090" y="355" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a5316">S3 bucket — external stage</text>
  <text x="1090" y="369" text-anchor="middle" font-size="9" fill="#8a5316">Block Public Access + SSE-KMS</text>

  <rect x="985" y="386" width="210" height="42" rx="4" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="1090" y="403" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a5316">Storage Integration role</text>
  <text x="1090" y="417" text-anchor="middle" font-size="9" fill="#8a5316">STS assumption, no access keys</text>

  <rect x="985" y="434" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="1090" y="451" text-anchor="middle" font-size="9.5" fill="#1a2330">IAM Identity Center</text>
  <text x="1090" y="465" text-anchor="middle" font-size="9" fill="#5b6472">permission set assignment</text>

  <text x="1090" y="500" text-anchor="middle" font-size="9" fill="#8a8f98">Group → Permission Set →</text>
  <text x="1090" y="513" text-anchor="middle" font-size="9" fill="#8a8f98">Account, from AD group JSON</text>

  <!-- Snowflake inset -->
  <rect x="1105" y="60" width="255" height="70" rx="8" fill="#e8f6ec" stroke="#2f8f52" stroke-width="1.5"/>
  <text x="1232" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d5c34">Snowflake AI Data Cloud</text>
  <text x="1232" y="100" text-anchor="middle" font-size="9.5" fill="#2f6b45">Platform / Data / Agent security —</text>
  <text x="1232" y="114" text-anchor="middle" font-size="9.5" fill="#2f6b45">see companion guardrails doc</text>

  <path d="M940,481 C1080,481 1260,481 1260,130" fill="none" stroke="#2f8f52" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- SCP guardrail panel -->
  <rect x="55" y="270" width="190" height="360" rx="8" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="150" y="292" text-anchor="middle" font-size="12" font-weight="700" fill="#7a2018">Service Control Policies</text>
  <text x="150" y="305" text-anchor="middle" font-size="9" fill="#a04a3f">deny-by-default, root or OU</text>

  <text x="70" y="326" font-size="9.5" fill="#5a2018">• deny-access-key-creation</text>
  <text x="70" y="344" font-size="9.5" fill="#5a2018">• deny-s3-public-access-changes</text>
  <text x="70" y="362" font-size="9.5" fill="#5a2018">• restrict-regions</text>
  <text x="70" y="380" font-size="9.5" fill="#5a2018">• deny-root-user (AWS-only)</text>
  <text x="70" y="398" font-size="9.5" fill="#5a2018">• require-s3-encryption</text>
  <text x="70" y="416" font-size="9.5" fill="#5a2018">• deny-leave-org</text>
  <text x="70" y="434" font-size="9.5" fill="#5a2018">• require-imdsv2</text>

  <line x1="150" y1="448" x2="150" y2="464" stroke="#c0392b" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="150" y="480" text-anchor="middle" font-size="9" font-weight="600" fill="#7a2018">IAM</text>
  <text x="70" y="498" font-size="9" fill="#5a2018">AD group JSON → Permission</text>
  <text x="70" y="512" font-size="9" fill="#5a2018">Set → account assignment</text>
  <text x="70" y="530" font-size="9" fill="#5a2018">CI role: GitHub OIDC federation,</text>
  <text x="70" y="544" font-size="9" fill="#5a2018">no stored access keys</text>
  <text x="70" y="562" font-size="9" fill="#5a2018">Break-glass: tagged principal</text>
  <text x="70" y="576" font-size="9" fill="#5a2018">exception only</text>

  <!-- Logging flow -->
  <path d="M150,251 C150,330 320,420 400,295" fill="none" stroke="#7a5fb0" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#arrow2)"/>
  <path d="M960,591 C700,650 480,320 430,270" fill="none" stroke="#7a5fb0" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#arrow2)"/>
  <text x="560" y="643" text-anchor="middle" font-size="9.5" fill="#7a5fb0">organization CloudTrail trail (is_organization_trail = true) → S3 + Glue/Athena in Log Archive account</text>

  <!-- Budget strip -->
  <rect x="675" y="655" width="575" height="60" rx="8" fill="#fff8e6" stroke="#c99a1a" stroke-width="1.5"/>
  <text x="962" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#7a5c0d">Cost Guardrails</text>
  <text x="962" y="694" text-anchor="middle" font-size="9.5" fill="#7a5c0d">Per-account AWS Budgets → SNS alerts at 50/75/90/100%. Prod: alert-only, never auto-disable.</text>

  <!-- Legend -->
  <rect x="55" y="655" width="595" height="60" rx="8" fill="#f8f9fa" stroke="#c7ccd1"/>
  <text x="75" y="675" font-size="10.5" font-weight="600" fill="#3a4250">Legend</text>
  <rect x="75" y="682" width="14" height="14" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="95" y="693" font-size="9.5" fill="#3a4250">Core LZ resource</text>
  <rect x="220" y="682" width="14" height="14" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="240" y="693" font-size="9.5" fill="#3a4250">Snowflake integration point</text>
  <rect x="430" y="682" width="14" height="14" fill="#fdf2f2" stroke="#c0392b"/>
  <text x="450" y="693" font-size="9.5" fill="#3a4250">Guardrail / policy</text>
</svg>
