<svg viewBox="0 0 1400 740" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6472"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="740" fill="#ffffff"/>

  <text x="700" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1a2330">GCP Landing Zone — Account &amp; Network Guardrails</text>
  <text x="700" y="55" text-anchor="middle" font-size="12.5" fill="#5b6472">Resource hierarchy, network, IAM, and logging — grounded in terraform/gcp-lz</text>

  <!-- Org bar -->
  <rect x="40" y="78" width="1320" height="40" rx="6" fill="#1a2330"/>
  <text x="700" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">organizations/ORG_ID</text>

  <!-- connector down to three folders -->
  <line x1="700" y1="118" x2="700" y2="140" stroke="#5b6472" stroke-width="2"/>
  <line x1="150" y1="140" x2="1250" y2="140" stroke="#5b6472" stroke-width="2"/>
  <line x1="150" y1="140" x2="150" y2="155" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="140" x2="490" y2="155" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="140" x2="900" y2="155" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Bootstrap folder -->
  <rect x="55" y="160" width="190" height="90" rx="8" fill="#f2f5f8" stroke="#5b6472" stroke-width="1.5"/>
  <text x="150" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1a2330">folder: bootstrap</text>
  <text x="150" y="202" text-anchor="middle" font-size="10.5" fill="#3a4250">Terraform state (GCS)</text>
  <text x="150" y="218" text-anchor="middle" font-size="10.5" fill="#3a4250">Cloud Build SA</text>
  <text x="150" y="234" text-anchor="middle" font-size="10.5" fill="#3a4250">org-level provisioning identity</text>

  <!-- Common folder -->
  <rect x="335" y="160" width="310" height="150" rx="8" fill="#f4f0fb" stroke="#7a5fb0" stroke-width="1.5"/>
  <text x="490" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3d2c5c">folder: common</text>

  <rect x="355" y="195" width="130" height="100" rx="6" fill="#ffffff" stroke="#7a5fb0"/>
  <text x="420" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#3d2c5c">{prefix}-logging</text>
  <text x="420" y="234" text-anchor="middle" font-size="9.5" fill="#5c4a80">BigQuery: audit_logs</text>
  <text x="420" y="248" text-anchor="middle" font-size="9.5" fill="#5c4a80">(partitioned, 365d)</text>
  <text x="420" y="264" text-anchor="middle" font-size="9.5" fill="#5c4a80">GCS: cold archive</text>
  <text x="420" y="278" text-anchor="middle" font-size="9.5" fill="#5c4a80">Nearline→Coldline→7y</text>

  <rect x="500" y="195" width="130" height="100" rx="6" fill="#ffffff" stroke="#7a5fb0"/>
  <text x="565" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#3d2c5c">{prefix}-security</text>
  <text x="565" y="238" text-anchor="middle" font-size="9.5" fill="#5c4a80">Security Command</text>
  <text x="565" y="252" text-anchor="middle" font-size="9.5" fill="#5c4a80">Center exports +</text>
  <text x="565" y="266" text-anchor="middle" font-size="9.5" fill="#5c4a80">notifications</text>

  <!-- Environments folder (wide) -->
  <rect x="675" y="160" width="575" height="470" rx="8" fill="#eef7fb" stroke="#1a8cc4" stroke-width="1.5"/>
  <text x="962" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0d4a63">folder: environments</text>
  <text x="962" y="198" text-anchor="middle" font-size="10" fill="#3a6b80">dev / staging / prod — prod shown; others mirror this structure</text>

  <rect x="695" y="210" width="535" height="405" rx="6" fill="#ffffff" stroke="#1a8cc4" stroke-dasharray="4,3"/>
  <text x="962" y="230" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0d4a63">env folder: prod</text>

  <!-- Host project -->
  <rect x="715" y="245" width="240" height="345" rx="6" fill="#fbfdff" stroke="#1a8cc4"/>
  <text x="835" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0d4a63">{prefix}-prod-host</text>
  <text x="835" y="279" text-anchor="middle" font-size="9.5" fill="#3a6b80">(Shared VPC owner)</text>

  <rect x="730" y="290" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="307" text-anchor="middle" font-size="9.5" fill="#1a2330">Shared VPC — explicit subnets</text>
  <text x="835" y="321" text-anchor="middle" font-size="9" fill="#5b6472">+ GKE secondary ranges</text>

  <rect x="730" y="338" width="210" height="30" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="357" text-anchor="middle" font-size="9.5" fill="#1a2330">Cloud Router + Cloud NAT</text>

  <rect x="730" y="374" width="210" height="30" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="393" text-anchor="middle" font-size="9.5" fill="#1a2330">Private DNS zone</text>

  <rect x="730" y="410" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="835" y="427" text-anchor="middle" font-size="9.5" fill="#1a2330">Firewall: deny-all ingress</text>
  <text x="835" y="441" text-anchor="middle" font-size="9" fill="#5b6472">allow internal + GCLB health checks</text>

  <rect x="730" y="458" width="210" height="46" rx="4" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="835" y="476" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a5316">Private Service Connect</text>
  <text x="835" y="490" text-anchor="middle" font-size="9" fill="#8a5316">endpoint → Snowflake account</text>

  <text x="835" y="522" text-anchor="middle" font-size="9" fill="#8a8f98">VPC Flow Logs: 5s / 50% sample /</text>
  <text x="835" y="535" text-anchor="middle" font-size="9" fill="#8a8f98">full metadata</text>

  <!-- Services project -->
  <rect x="970" y="245" width="240" height="345" rx="6" fill="#fbfdff" stroke="#1a8cc4"/>
  <text x="1090" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0d4a63">{prefix}-prod-svc</text>
  <text x="1090" y="279" text-anchor="middle" font-size="9.5" fill="#3a6b80">(workloads — no network of its own)</text>

  <rect x="985" y="290" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="1090" y="307" text-anchor="middle" font-size="9.5" fill="#1a2330">GKE / Cloud Run / Cloud SQL</text>
  <text x="1090" y="321" text-anchor="middle" font-size="9" fill="#5b6472">attaches to host VPC subnet</text>

  <rect x="985" y="338" width="210" height="42" rx="4" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="1090" y="355" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a5316">GCS bucket — external stage</text>
  <text x="1090" y="369" text-anchor="middle" font-size="9" fill="#8a5316">uniform bucket-level access</text>

  <rect x="985" y="386" width="210" height="42" rx="4" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="1090" y="403" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a5316">Storage Integration</text>
  <text x="1090" y="417" text-anchor="middle" font-size="9" fill="#8a5316">role-assumption, no SA keys</text>

  <rect x="985" y="434" width="210" height="42" rx="4" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="1090" y="451" text-anchor="middle" font-size="9.5" fill="#1a2330">Workload Identity SA</text>
  <text x="1090" y="465" text-anchor="middle" font-size="9" fill="#5b6472">K8s SA → GCP SA binding</text>

  <text x="1090" y="500" text-anchor="middle" font-size="9" fill="#8a8f98">IAM: project-level bindings from</text>
  <text x="1090" y="513" text-anchor="middle" font-size="9" fill="#8a8f98">AD group JSON (fine-grained)</text>

  <!-- Snowflake inset, connected from PSC -->
  <rect x="1105" y="60" width="255" height="70" rx="8" fill="#e8f6ec" stroke="#2f8f52" stroke-width="1.5"/>
  <text x="1232" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d5c34">Snowflake AI Data Cloud</text>
  <text x="1232" y="100" text-anchor="middle" font-size="9.5" fill="#2f6b45">Platform / Data / Agent security —</text>
  <text x="1232" y="114" text-anchor="middle" font-size="9.5" fill="#2f6b45">see companion guardrails doc</text>

  <path d="M940,481 C1080,481 1260,481 1260,130" fill="none" stroke="#2f8f52" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Org Policy guardrail panel -->
  <rect x="55" y="270" width="190" height="360" rx="8" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="150" y="292" text-anchor="middle" font-size="12" font-weight="700" fill="#7a2018">Org Policies</text>
  <text x="150" y="305" text-anchor="middle" font-size="9" fill="#a04a3f">deny-by-default at root</text>

  <text x="70" y="326" font-size="9.5" fill="#5a2018">• skipDefaultNetworkCreation</text>
  <text x="70" y="344" font-size="9.5" fill="#5a2018">• vmExternalIpAccess: deny</text>
  <text x="70" y="362" font-size="9.5" fill="#5a2018">• disableServiceAccountKeyCreation</text>
  <text x="70" y="380" font-size="9.5" fill="#5a2018">• uniformBucketLevelAccess</text>
  <text x="70" y="398" font-size="9.5" fill="#5a2018">• allowedPolicyMemberDomains</text>
  <text x="70" y="416" font-size="9.5" fill="#5a2018">• resourceLocations (residency)</text>
  <text x="70" y="434" font-size="9.5" fill="#5a2018">• requireOsLogin</text>
  <text x="70" y="452" font-size="9.5" fill="#5a2018">• disableSerialPortAccess</text>
  <text x="70" y="470" font-size="9.5" fill="#5a2018">• requireShieldedVm</text>
  <text x="70" y="488" font-size="9.5" fill="#5a2018">• restrictSharedVpcHostProjects</text>

  <line x1="150" y1="502" x2="150" y2="518" stroke="#c0392b" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="150" y="534" text-anchor="middle" font-size="9" font-weight="600" fill="#7a2018">IAM</text>
  <text x="70" y="552" font-size="9" fill="#5a2018">AD group JSON → org/</text>
  <text x="70" y="566" font-size="9" fill="#5a2018">folder/project bindings</text>
  <text x="70" y="584" font-size="9" fill="#5a2018">Cloud Build SA: scoped</text>
  <text x="70" y="598" font-size="9" fill="#5a2018">org roles, provisioning only</text>
  <text x="70" y="616" font-size="9" fill="#5a2018">Workload Identity — no keys</text>

  <!-- Logging flow arrows from folders down to logging project -->
  <path d="M150,251 C150,330 320,420 400,295" fill="none" stroke="#7a5fb0" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <path d="M960,591 C700,650 480,320 430,270" fill="none" stroke="#7a5fb0" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="560" y="643" text-anchor="middle" font-size="9.5" fill="#7a5fb0">org-level log sinks (include_children = true) → BigQuery + GCS in logging project</text>

  <!-- Budget alerts strip -->
  <rect x="675" y="655" width="575" height="60" rx="8" fill="#fff8e6" stroke="#c99a1a" stroke-width="1.5"/>
  <text x="962" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#7a5c0d">Cost Guardrails</text>
  <text x="962" y="694" text-anchor="middle" font-size="9.5" fill="#7a5c0d">Per-project budgets (host + svc) → Pub/Sub alerts at 50/75/90/100%. Prod: alert-only, never auto-disable billing.</text>

  <!-- Legend -->
  <rect x="55" y="655" width="595" height="60" rx="8" fill="#f8f9fa" stroke="#c7ccd1"/>
  <text x="75" y="675" font-size="10.5" font-weight="600" fill="#3a4250">Legend</text>
  <rect x="75" y="682" width="14" height="14" fill="#eef7fb" stroke="#1a8cc4"/>
  <text x="95" y="693" font-size="9.5" fill="#3a4250">Core LZ resource</text>
  <rect x="220" y="682" width="14" height="14" fill="#fff4e8" stroke="#d98c2b"/>
  <text x="240" y="693" font-size="9.5" fill="#3a4250">Snowflake integration point</text>
  <rect x="430" y="682" width="14" height="14" fill="#fdf2f2" stroke="#c0392b"/>
  <text x="450" y="693" font-size="9.5" fill="#3a4250">Guardrail / policy</text>
</svg>
